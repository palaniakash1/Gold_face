<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gold Face - Virtual Jewelry Try-On</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream-50: #FDFBF7;
            --cream-100: #FAF7F0;
            --cream-200: #F5EFE4;
            --cream-300: #EBE0CC;
            --brown-500: #8B7355;
            --brown-600: #6B5344;
            --brown-700: #5C4535;
            --brown-800: #3D2E24;
            --brown-900: #2A1F17;
            --gold-400: #D4AF37;
            --gold-500: #C9A227;
            --gold-600: #B8960F;
            --shadow-sm: 0 2px 8px rgba(42, 31, 23, 0.08);
            --shadow-md: 0 4px 20px rgba(42, 31, 23, 0.12);
            --shadow-lg: 0 8px 40px rgba(42, 31, 23, 0.16);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, var(--cream-100) 0%, var(--cream-200) 100%);
            min-height: 100vh;
            color: var(--brown-800);
            line-height: 1.6;
        }

        .app {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            padding: 16px 20px;
            background: var(--cream-50);
            border-bottom: 1px solid var(--cream-300);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.75rem;
            font-weight: 600;
            color: var(--brown-800);
            letter-spacing: 0.02em;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-icon {
            width: 28px;
            height: 28px;
            fill: var(--gold-500);
        }

        .logo span {
            color: var(--gold-500);
        }

        main {
            flex: 1;
            padding: 16px;
            padding-bottom: 100px;
        }

        .camera-wrapper {
            position: relative;
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: var(--shadow-lg);
            background: var(--brown-900);
            aspect-ratio: 4/5;
            max-height: 70vh;
        }

        .camera-wrapper::before {
            content: '';
            position: absolute;
            inset: 0;
            border: 2px solid var(--cream-300);
            border-radius: 24px;
            pointer-events: none;
            z-index: 2;
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        .camera-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px;
            background: linear-gradient(transparent, rgba(42, 31, 23, 0.7));
            z-index: 3;
        }

        .jewelry-label {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.1rem;
            color: var(--cream-100);
            text-align: center;
            margin-bottom: 12px;
        }

        .nav-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .nav-btn {
            flex: 1;
            max-width: 140px;
            padding: 12px 20px;
            background: var(--cream-50);
            border: none;
            border-radius: 50px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--brown-700);
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .nav-btn:active {
            transform: scale(0.96);
        }

        .nav-btn svg {
            width: 16px;
            height: 16px;
            fill: var(--brown-600);
        }

        .capture-btn {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--gold-500);
            border: 3px solid var(--cream-50);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
        }

        .capture-btn:active {
            transform: scale(0.92);
        }

        .capture-btn:hover {
            background: var(--gold-600);
        }

        .capture-btn svg {
            width: 24px;
            height: 24px;
            fill: var(--cream-50);
        }

        .capture-btn.captured {
            animation: captureFlash 0.3s ease;
        }

        @keyframes captureFlash {
            0% { transform: scale(1); background: var(--gold-500); }
            50% { transform: scale(1.1); background: #fff; }
            100% { transform: scale(1); background: var(--gold-500); }
        }

        .status-bar {
            position: absolute;
            top: 16px;
            left: 16px;
            right: 16px;
            padding: 12px 16px;
            background: rgba(253, 251, 247, 0.95);
            border-radius: 12px;
            font-size: 0.8rem;
            text-align: center;
            z-index: 10;
            box-shadow: var(--shadow-sm);
        }

        .status-bar.loading {
            color: var(--brown-600);
        }

        .status-bar.success {
            color: var(--brown-700);
        }

        .status-bar.error {
            color: #B85450;
            background: rgba(253, 251, 247, 0.98);
        }

        .gallery-section {
            margin-top: 24px;
        }

        .gallery-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding: 0 4px;
        }

        .gallery-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--brown-800);
        }

        .add-url-btn {
            padding: 8px 16px;
            background: transparent;
            border: 1.5px solid var(--brown-500);
            border-radius: 50px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--brown-600);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .add-url-btn:active {
            background: var(--brown-500);
            color: var(--cream-50);
        }

        .gallery-category {
            margin-bottom: 20px;
        }

        .category-label {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--brown-500);
            margin-bottom: 10px;
            padding-left: 4px;
        }

        .thumbnail-scroll {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding: 4px;
            padding-bottom: 8px;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }

        .thumbnail-scroll::-webkit-scrollbar {
            display: none;
        }

        .thumbnail {
            flex-shrink: 0;
            width: 72px;
            height: 72px;
            border-radius: 16px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.3s ease;
            background: var(--cream-50);
            padding: 8px;
            object-fit: contain;
        }

        .thumbnail:hover {
            border-color: var(--gold-400);
        }

        .thumbnail.active {
            border-color: var(--gold-500);
            box-shadow: 0 0 0 3px rgba(201, 162, 39, 0.2);
        }

        .add-thumbnail {
            flex-shrink: 0;
            width: 72px;
            height: 72px;
            border-radius: 16px;
            border: 2px dashed var(--cream-300);
            background: var(--cream-100);
            color: var(--brown-500);
            font-size: 2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .add-thumbnail:hover {
            border-color: var(--gold-400);
            color: var(--gold-500);
            background: var(--cream-200);
        }

        .add-thumbnail:active {
            transform: scale(0.95);
        }

        .preview-area {
            width: 100%;
            height: 160px;
            border-radius: 16px;
            background: var(--cream-100);
            border: 2px dashed var(--cream-300);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .preview-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            color: var(--cream-300);
        }

        .preview-placeholder span {
            font-size: 0.8rem;
        }

        .preview-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            display: none;
        }

        .preview-image.visible {
            display: block;
        }

        .preview-area.has-image .preview-placeholder {
            display: none;
        }

        .modal-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .modal-tab {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            background: var(--cream-200);
            color: var(--brown-600);
            font-family: 'Montserrat', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .modal-tab.active {
            background: linear-gradient(135deg, var(--gold-500) 0%, var(--gold-600) 100%);
            color: var(--cream-50);
        }

        .modal-content-area {
            margin-bottom: 20px;
        }

        .upload-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding: 24px;
            border: 2px dashed var(--cream-300);
            border-radius: 16px;
            background: var(--cream-100);
        }

        .upload-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            border: none;
            border-radius: 50px;
            background: var(--brown-600);
            color: var(--cream-50);
            font-family: 'Montserrat', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .upload-btn:hover {
            background: var(--brown-700);
        }

        .upload-hint {
            font-size: 0.75rem;
            color: var(--brown-500);
        }

        .url-area {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .url-hint {
            font-size: 0.7rem;
            color: var(--brown-500);
            margin-top: 4px;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(42, 31, 23, 0.6);
            z-index: 1000;
            backdrop-filter: blur(4px);
            align-items: flex-end;
            justify-content: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            width: 100%;
            max-width: 480px;
            background: var(--cream-50);
            border-radius: 24px 24px 0 0;
            padding: 24px;
            padding-bottom: max(24px, env(safe-area-inset-bottom));
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(100%);
            }
            to {
                transform: translateY(0);
            }
        }

        .modal-handle {
            width: 40px;
            height: 4px;
            background: var(--cream-300);
            border-radius: 2px;
            margin: 0 auto 20px;
        }

        .modal-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--brown-800);
            margin-bottom: 8px;
        }

        .modal-hint {
            font-size: 0.75rem;
            color: var(--brown-500);
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .modal-hint strong {
            color: var(--brown-600);
        }

        .url-input {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid var(--cream-300);
            border-radius: 12px;
            background: var(--cream-100);
            font-family: 'Montserrat', sans-serif;
            font-size: 0.9rem;
            color: var(--brown-800);
            transition: border-color 0.3s ease;
        }

        .url-input::placeholder {
            color: var(--brown-500);
        }

        .url-input:focus {
            outline: none;
            border-color: var(--gold-500);
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .modal-btn {
            flex: 1;
            padding: 14px 20px;
            border: none;
            border-radius: 12px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .modal-btn.cancel {
            background: var(--cream-200);
            color: var(--brown-600);
        }

        .modal-btn.confirm {
            background: linear-gradient(135deg, var(--gold-500) 0%, var(--gold-600) 100%);
            color: var(--cream-50);
        }

        .modal-btn:active {
            transform: scale(0.98);
        }

        @media (min-width: 768px) {
            main {
                display: flex;
                gap: 32px;
                max-width: 1100px;
                margin: 0 auto;
                padding: 32px;
                padding-bottom: 32px;
            }

            .camera-column {
                flex: 1;
                max-width: 420px;
            }

            .gallery-column {
                flex: 1;
                max-width: 400px;
            }

            .camera-wrapper {
                max-height: none;
                aspect-ratio: 3/4;
            }

            .gallery-section {
                margin-top: 0;
            }

            .modal-overlay {
                align-items: center;
            }

            .modal {
                border-radius: 24px;
                max-width: 440px;
            }

            @keyframes slideUp {
                from {
                    transform: translateY(20px);
                    opacity: 0;
                }
                to {
                    transform: translateY(0);
                    opacity: 1;
                }
            }

            header {
                padding: 20px 32px;
            }

            .logo {
                font-size: 2rem;
            }
        }

        @media (min-width: 1024px) {
            main {
                gap: 48px;
            }

            .camera-column {
                max-width: 500px;
            }

            .gallery-column {
                max-width: 450px;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <header>
            <div class="logo">
                <svg class="logo-icon" viewBox="0 0 24 24">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                </svg>
                Gold<span>Face</span>
            </div>
        </header>

        <main>
            <div class="camera-column">
                <div class="camera-wrapper">
                    <video id="video" autoplay playsinline muted></video>
                    <canvas id="canvas"></canvas>
                    
                    <div class="status-bar loading" id="status">Loading AI model...</div>
                    
                    <div class="camera-overlay">
                        <div class="jewelry-label" id="currentCombo">Necklace 1 + Earring 1</div>
                        <div class="nav-buttons">
                            <button class="nav-btn" id="prevBtn">
                                <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
                                Prev
                            </button>
                            <button class="capture-btn" id="captureBtn" title="Capture Photo">
                                <svg viewBox="0 0 24 24" fill="currentColor">
                                    <circle cx="12" cy="12" r="3.5"/>
                                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8z"/>
                                </svg>
                            </button>
                            <button class="nav-btn" id="nextBtn">
                                Next
                                <svg viewBox="0 0 24 24"><path d="M8.59 16.59L10 18l6-6-6-6-1.41 1.41L13.17 12z"/></svg>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="gallery-column">
                <div class="gallery-section">
                    <div class="gallery-header">
                        <h2 class="gallery-title">Collection</h2>
                    </div>
                    
                    <div class="gallery-category">
                        <div class="category-label">Necklaces</div>
                        <div class="thumbnail-scroll" id="necklaceGallery">
                            <button class="add-thumbnail" id="addNecklaceBtn">+</button>
                        </div>
                    </div>
                    
                    <div class="gallery-category">
                        <div class="category-label">Earrings</div>
                        <div class="thumbnail-scroll" id="earringGallery">
                            <button class="add-thumbnail" id="addEarringBtn">+</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="modal-overlay" id="urlModal">
        <div class="modal">
            <div class="modal-handle"></div>
            <h3 class="modal-title" id="modalTitle">Add Custom Jewelry</h3>
            
            <div class="preview-area" id="previewArea">
                <div class="preview-placeholder" id="previewPlaceholder">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <rect x="3" y="3" width="18" height="18" rx="2"/>
                        <circle cx="8.5" cy="8.5" r="1.5"/>
                        <path d="M21 15l-5-5L5 21"/>
                    </svg>
                    <span>Preview will appear here</span>
                </div>
                <img id="previewImage" class="preview-image" src="" alt="Preview">
            </div>
            
            <div class="modal-tabs">
                <button class="modal-tab active" id="tabUpload">Upload</button>
                <button class="modal-tab" id="tabUrl">URL</button>
            </div>
            
            <div class="modal-content-area">
                <div class="upload-area" id="uploadArea">
                    <input type="file" id="fileInput" accept="image/*" hidden>
                    <button class="upload-btn" id="uploadBtn">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="17 8 12 3 7 8"/>
                            <line x1="12" y1="3" x2="12" y2="15"/>
                        </svg>
                        Choose Image
                    </button>
                    <p class="upload-hint">or drag and drop</p>
                </div>
                <div class="url-area" id="urlArea" style="display: none;">
                    <input type="text" class="url-input" id="customUrlInput" placeholder="Paste image URL (imgur, imgbb, etc.)">
                    <p class="url-hint">Earrings: use left+right side-by-side image</p>
                </div>
            </div>
            
            <div class="modal-actions">
                <button class="modal-btn cancel" id="modalCancel">Cancel</button>
                <button class="modal-btn confirm" id="modalAdd">Add</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const status = document.getElementById('status');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const captureBtn = document.getElementById('captureBtn');
        const currentComboEl = document.getElementById('currentCombo');
        const necklaceGallery = document.getElementById('necklaceGallery');
        const earringGallery = document.getElementById('earringGallery');
        const urlModal = document.getElementById('urlModal');
        const customUrlInput = document.getElementById('customUrlInput');
        const modalTitle = document.getElementById('modalTitle');
        const modalCancel = document.getElementById('modalCancel');
        const modalAdd = document.getElementById('modalAdd');

        let necklaces = [];
        let earrings = [];
        let currentNecklaceIndex = 0;
        let currentEarringIndex = 0;
        let faceMesh = null;
        let currentLandmarks = null;
        let mpCamera = null;

        // MediaPipe Face Mesh landmark indices
        const LANDMARKS = {
            // Ears
            LEFT_TRAGUS: 33,        // Left ear tragus (ear hole)
            RIGHT_TRAGUS: 263,      // Right ear tragus
            LEFT_EAR_OUTER: 234,   // Left ear outer
            RIGHT_EAR_OUTER: 454,   // Right ear outer
            LEFT_TEMPLE: 127,       // Left temple
            RIGHT_TEMPLE: 356,     // Right temple
            // Face outline
            CHIN: 152,
            LEFT_CHIN: 234,
            RIGHT_CHIN: 454,
            // Eyes
            LEFT_EYE_OUTER: 33,
            RIGHT_EYE_OUTER: 263,
            // Nose
            NOSE_TIP: 1,
            NOSE_BOTTOM: 2,
            NOSE_LEFT: 49,
            NOSE_RIGHT: 275,
        };

        async function initFaceMesh() {
            try {
                status.textContent = 'Loading AI model...';
                status.className = 'status-bar loading';
                
                faceMesh = new FaceMesh({
                    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
                });
                
                faceMesh.setOptions({
                    maxNumFaces: 1,
                    refineLandmarks: true,
                    minDetectionConfidence: 0.5,
                    minTrackingConfidence: 0.5
                });
                
                faceMesh.onResults(onResults);
                
                await faceMesh.initialize();
                
                status.textContent = 'Starting camera...';
                startCamera();
            } catch (error) {
                console.error('Error initializing FaceMesh:', error);
                status.textContent = 'Model load failed';
                status.className = 'status-bar error';
            }
        }

        async function startCamera() {
            try {
                mpCamera = new Camera(video, {
                    onFrame: async () => {
                        if (faceMesh && video.readyState >= 2) {
                            await faceMesh.send({ image: video });
                        }
                    },
                    width: 720,
                    height: 960
                });
                await mpCamera.start();
                
                if (status.className === 'status-bar loading') {
                    status.textContent = 'Ready';
                    status.className = 'status-bar success';
                    setTimeout(() => status.style.display = 'none', 2000);
                }
            } catch (error) {
                console.error('Error accessing camera:', error);
                status.textContent = 'Camera access denied';
                status.className = 'status-bar error';
            }
        }

        function onResults(results) {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                currentLandmarks = results.multiFaceLandmarks[0];
                
                drawNecklace();
                drawEarrings();
            }
        }

        function getLandmark(idx) {
            if (!currentLandmarks || !currentLandmarks[idx]) return null;
            const lm = currentLandmarks[idx];
            return {
                x: lm.x * canvas.width,
                y: lm.y * canvas.height
            };
        }

        function getFaceDimensions() {
            const leftEar = getLandmark(LANDMARKS.LEFT_EAR_OUTER);
            const rightEar = getLandmark(LANDMARKS.RIGHT_EAR_OUTER);
            const chin = getLandmark(LANDMARKS.CHIN);
            const noseTip = getLandmark(LANDMARKS.NOSE_TIP);
            
            if (!leftEar || !rightEar || !chin || !noseTip) return null;
            
            const faceWidth = Math.hypot(rightEar.x - leftEar.x, rightEar.y - leftEar.y);
            const faceHeight = Math.hypot(noseTip.x - chin.x, noseTip.y - chin.y);
            
            return {
                width: faceWidth,
                height: faceHeight,
                chin: chin,
                leftEar: leftEar,
                rightEar: rightEar,
                noseTip: noseTip
            };
        }

        function removeBackground(image) {
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = image.width;
            tempCanvas.height = image.height;
            const tempCtx = tempCanvas.getContext('2d');
            
            tempCtx.drawImage(image, 0, 0);
            const imageData = tempCtx.getImageData(0, 0, tempCanvas.width, tempCanvas.height);
            const data = imageData.data;
            
            for (let i = 0; i < data.length; i += 4) {
                const r = data[i];
                const g = data[i + 1];
                const b = data[i + 2];
                
                const brightness = (r + g + b) / 3;
                const maxRGB = Math.max(r, g, b);
                const minRGB = Math.min(r, g, b);
                const saturation = maxRGB === 0 ? 0 : (maxRGB - minRGB) / maxRGB;
                
                const isWhite = r > 230 && g > 230 && b > 230 && saturation < 0.15;
                const isBlack = r < 25 && g < 25 && b < 25;
                const isGray = brightness > 220 && saturation < 0.08;
                
                if (isWhite || isBlack || isGray) {
                    data[i + 3] = 0;
                }
            }
            
            tempCtx.putImageData(imageData, 0, 0);
            return tempCanvas;
        }

        function getNecklacePosition(faceDims) {
            const chin = faceDims.chin;
            const faceWidth = faceDims.width;
            
            const width = faceWidth * 0.9;
            const height = faceWidth * 0.25;
            
            return {
                x: chin.x - width / 2,
                y: chin.y + faceWidth * 0.02,
                width: width,
                height: height
            };
        }

        function getEarringPositions(faceDims) {
            const faceWidth = faceDims.width;
            const leftEar = faceDims.leftEar;
            const rightEar = faceDims.rightEar;
            
            const earWidth = faceWidth * 0.12;
            const earHeight = earWidth * 2.0;
            
            return {
                left: {
                    x: leftEar.x - earWidth * 0.5,
                    y: leftEar.y + faceWidth * 0.08,
                    width: earWidth,
                    height: earHeight
                },
                right: {
                    x: rightEar.x - earWidth * 0.5,
                    y: rightEar.y + faceWidth * 0.08,
                    width: earWidth,
                    height: earHeight
                }
            };
        }

        function drawNecklace() {
            if (necklaces.length === 0 || !currentLandmarks) return;
            const necklace = necklaces[currentNecklaceIndex];
            if (!necklace || !necklace.loaded) return;
            
            const faceDims = getFaceDimensions();
            if (!faceDims) return;
            
            const pos = getNecklacePosition(faceDims);
            
            if (!necklace.processed) {
                necklace.processed = removeBackground(necklace.img);
            }
            
            ctx.drawImage(necklace.processed, pos.x, pos.y, pos.width, pos.height);
        }

        function drawEarrings() {
            if (earrings.length === 0 || !currentLandmarks) return;
            const earring = earrings[currentEarringIndex];
            if (!earring || !earring.loaded) return;
            
            const faceDims = getFaceDimensions();
            if (!faceDims) return;
            
            const pos = getEarringPositions(faceDims);
            const img = earring.img;
            const halfWidth = img.width / 2;
            
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = halfWidth;
            tempCanvas.height = img.height;
            const tempCtx = tempCanvas.getContext('2d');
            
            if (!earring.processedLeft) {
                tempCtx.drawImage(img, 0, 0, halfWidth, img.height, 0, 0, halfWidth, img.height);
                earring.processedLeft = removeBackgroundFromCanvas(tempCtx);
            }
            
            if (!earring.processedRight) {
                tempCtx.clearRect(0, 0, halfWidth, img.height);
                tempCtx.drawImage(img, halfWidth, 0, halfWidth, img.height, 0, 0, halfWidth, img.height);
                earring.processedRight = removeBackgroundFromCanvas(tempCtx);
            }
            
            ctx.drawImage(earring.processedLeft, pos.left.x, pos.left.y, pos.left.width, pos.left.height);
            ctx.drawImage(earring.processedRight, pos.right.x, pos.right.y, pos.right.width, pos.right.height);
        }

        function removeBackgroundFromCanvas(sourceCtx) {
            const canvas = document.createElement('canvas');
            canvas.width = sourceCtx.canvas.width;
            canvas.height = sourceCtx.canvas.height;
            const targetCtx = canvas.getContext('2d');
            
            targetCtx.drawImage(sourceCtx.canvas, 0, 0);
            const imageData = targetCtx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            
            for (let i = 0; i < data.length; i += 4) {
                const r = data[i];
                const g = data[i + 1];
                const b = data[i + 2];
                
                const brightness = (r + g + b) / 3;
                const maxRGB = Math.max(r, g, b);
                const minRGB = Math.min(r, g, b);
                const saturation = maxRGB === 0 ? 0 : (maxRGB - minRGB) / maxRGB;
                
                const isWhite = r > 230 && g > 230 && b > 230 && saturation < 0.15;
                const isBlack = r < 25 && g < 25 && b < 25;
                const isGray = brightness > 220 && saturation < 0.08;
                
                if (isWhite || isBlack || isGray) {
                    data[i + 3] = 0;
                }
            }
            
            targetCtx.putImageData(imageData, 0, 0);
            return canvas;
        }

        function loadJewelryImages() {
            const necklaceNames = ['necklace_1.png', 'necklace_2.png', 'necklace_3.png'];
            const earringNames = ['earing_1.jpg', 'earing_2.jpg', 'earing_3.jpg'];
            
            necklaceNames.forEach((name, index) => {
                const img = new Image();
                img.crossOrigin = 'anonymous';
                img.src = `jewelry/necklace/${name}`;
                img.onload = () => {
                    necklaces[index] = { img, loaded: true, processed: null };
                    addThumbnail(necklaceGallery, necklaces[index], index, 'necklace');
                    checkAllLoaded();
                };
                img.onerror = () => checkAllLoaded();
            });
            
            earringNames.forEach((name, index) => {
                const img = new Image();
                img.crossOrigin = 'anonymous';
                img.src = `jewelry/earring/${name}`;
                img.onload = () => {
                    earrings[index] = { img, loaded: true, processedLeft: null, processedRight: null };
                    addThumbnail(earringGallery, earrings[index], index, 'earring');
                    checkAllLoaded();
                };
                img.onerror = () => checkAllLoaded();
            });
        }

        function addThumbnail(container, jewelry, index, type) {
            const thumb = document.createElement('img');
            thumb.src = jewelry.img.src;
            thumb.className = 'thumbnail' + (index === 0 ? ' active' : '');
            thumb.addEventListener('click', () => {
                container.querySelectorAll('.thumbnail').forEach(t => t.classList.remove('active'));
                thumb.classList.add('active');
                if (type === 'necklace') {
                    currentNecklaceIndex = index;
                } else {
                    currentEarringIndex = index;
                }
                updateCurrentCombo();
            });
            const addBtn = container.querySelector('.add-thumbnail');
            container.insertBefore(thumb, addBtn);
        }

        function checkAllLoaded() {
            if (necklaces.filter(n => n?.loaded).length && earrings.filter(e => e?.loaded).length) {
                updateCurrentCombo();
            }
        }

        function updateCurrentCombo() {
            currentComboEl.textContent = `Necklace ${currentNecklaceIndex + 1} + Earring ${currentEarringIndex + 1}`;
        }

        function hideModal() {
            urlModal.classList.remove('active');
            currentModalType = null;
            pendingImage = null;
        }

        let pendingImage = null;

        function showModal(type) {
            currentModalType = type;
            modalTitle.textContent = type === 'necklace' ? 'Add Custom Necklace' : 'Add Custom Earrings';
            customUrlInput.value = '';
            pendingImage = null;
            document.getElementById('previewImage').src = '';
            document.getElementById('previewImage').classList.remove('visible');
            document.getElementById('previewArea').classList.remove('has-image');
            document.getElementById('tabUpload').classList.add('active');
            document.getElementById('tabUrl').classList.remove('active');
            document.getElementById('uploadArea').style.display = 'flex';
            document.getElementById('urlArea').style.display = 'none';
            urlModal.classList.add('active');
        }

        document.getElementById('addNecklaceBtn').addEventListener('click', () => showModal('necklace'));
        document.getElementById('addEarringBtn').addEventListener('click', () => showModal('earring'));
        modalCancel.addEventListener('click', hideModal);
        
        document.getElementById('tabUpload').addEventListener('click', () => {
            document.getElementById('tabUpload').classList.add('active');
            document.getElementById('tabUrl').classList.remove('active');
            document.getElementById('uploadArea').style.display = 'flex';
            document.getElementById('urlArea').style.display = 'none';
        });
        
        document.getElementById('tabUrl').addEventListener('click', () => {
            document.getElementById('tabUrl').classList.add('active');
            document.getElementById('tabUpload').classList.remove('active');
            document.getElementById('urlArea').style.display = 'flex';
            document.getElementById('uploadArea').style.display = 'none';
            customUrlInput.focus();
        });
        
        document.getElementById('uploadBtn').addEventListener('click', () => {
            document.getElementById('fileInput').click();
        });
        
        document.getElementById('fileInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const dataUrl = event.target.result;
                    document.getElementById('previewImage').src = dataUrl;
                    document.getElementById('previewImage').classList.add('visible');
                    document.getElementById('previewArea').classList.add('has-image');
                    pendingImage = dataUrl;
                };
                reader.readAsDataURL(file);
            }
        });
        
        customUrlInput.addEventListener('input', () => {
            const url = customUrlInput.value.trim();
            if (url) {
                document.getElementById('previewImage').src = url;
                document.getElementById('previewImage').classList.add('visible');
                document.getElementById('previewArea').classList.add('has-image');
                pendingImage = url;
            } else {
                document.getElementById('previewImage').src = '';
                document.getElementById('previewImage').classList.remove('visible');
                document.getElementById('previewArea').classList.remove('has-image');
                pendingImage = null;
            }
        });
        
        modalAdd.addEventListener('click', () => {
            if (!pendingImage) {
                status.textContent = 'Please select or enter an image URL';
                status.className = 'status-bar error';
                status.style.display = 'block';
                setTimeout(() => status.style.display = 'none', 3000);
                return;
            }
            
            const img = new Image();
            
            if (pendingImage.startsWith('data:')) {
                img.onload = () => {
                    addJewelryFromDataURL(pendingImage);
                };
                img.src = pendingImage;
            } else {
                const blockedDomains = ['pinterest', 'pin.it', 'instagram', 'facebook', 'twitter'];
                if (blockedDomains.some(d => pendingImage.toLowerCase().includes(d))) {
                    status.textContent = 'Social media URLs not supported';
                    status.className = 'status-bar error';
                    status.style.display = 'block';
                    setTimeout(() => status.style.display = 'none', 3000);
                    return;
                }
                
                img.crossOrigin = 'anonymous';
                img.onload = () => {
                    addJewelryFromURL(pendingImage);
                };
                img.onerror = () => {
                    status.textContent = 'Failed to load image';
                    status.className = 'status-bar error';
                    status.style.display = 'block';
                    setTimeout(() => status.style.display = 'none', 3000);
                };
                img.src = pendingImage;
            }
        });
        
        function addJewelryFromDataURL(dataUrl) {
            const jewelryArray = currentModalType === 'necklace' ? necklaces : earrings;
            const gallery = currentModalType === 'necklace' ? necklaceGallery : earringGallery;
            
            const img = new Image();
            img.src = dataUrl;
            img.onload = () => {
                const newJewelry = { 
                    img, 
                    loaded: true, 
                    processed: null,
                    processedLeft: null, 
                    processedRight: null 
                };
                jewelryArray.push(newJewelry);
                addThumbnail(gallery, newJewelry, jewelryArray.length - 1, currentModalType);
                
                if (currentModalType === 'necklace') {
                    currentNecklaceIndex = jewelryArray.length - 1;
                } else {
                    currentEarringIndex = jewelryArray.length - 1;
                }
                updateCurrentCombo();
                hideModal();
            };
        }
        
        function addJewelryFromURL(url) {
            const jewelryArray = currentModalType === 'necklace' ? necklaces : earrings;
            const gallery = currentModalType === 'necklace' ? necklaceGallery : earringGallery;
            
            const img = new Image();
            img.crossOrigin = 'anonymous';
            img.onload = () => {
                const newJewelry = { 
                    img, 
                    loaded: true, 
                    processed: null,
                    processedLeft: null, 
                    processedRight: null 
                };
                jewelryArray.push(newJewelry);
                addThumbnail(gallery, newJewelry, jewelryArray.length - 1, currentModalType);
                
                if (currentModalType === 'necklace') {
                    currentNecklaceIndex = jewelryArray.length - 1;
                } else {
                    currentEarringIndex = jewelryArray.length - 1;
                }
                updateCurrentCombo();
                hideModal();
            };
            img.onerror = () => {
                status.textContent = 'Failed to load image';
                status.className = 'status-bar error';
                status.style.display = 'block';
                setTimeout(() => status.style.display = 'none', 3000);
            };
            img.src = url;
        }
        
        urlModal.addEventListener('click', (e) => {
            if (e.target === urlModal) hideModal();
        });

        prevBtn.addEventListener('click', () => {
            const total = Math.max(necklaces.length, 1) * Math.max(earrings.length, 1);
            if (total <= 1) return;
            const current = currentNecklaceIndex * Math.max(earrings.length, 1) + currentEarringIndex;
            const next = (current - 1 + total) % total;
            currentNecklaceIndex = Math.floor(next / Math.max(earrings.length, 1));
            currentEarringIndex = next % Math.max(earrings.length, 1);
            
            necklaceGallery.querySelectorAll('.thumbnail').forEach((t, i) => t.classList.toggle('active', i === currentNecklaceIndex));
            earringGallery.querySelectorAll('.thumbnail').forEach((t, i) => t.classList.toggle('active', i === currentEarringIndex));
            updateCurrentCombo();
        });

        nextBtn.addEventListener('click', () => {
            const total = Math.max(necklaces.length, 1) * Math.max(earrings.length, 1);
            if (total <= 1) return;
            const current = currentNecklaceIndex * Math.max(earrings.length, 1) + currentEarringIndex;
            const next = (current + 1) % total;
            currentNecklaceIndex = Math.floor(next / Math.max(earrings.length, 1));
            currentEarringIndex = next % Math.max(earrings.length, 1);
            
            necklaceGallery.querySelectorAll('.thumbnail').forEach((t, i) => t.classList.toggle('active', i === currentNecklaceIndex));
            earringGallery.querySelectorAll('.thumbnail').forEach((t, i) => t.classList.toggle('active', i === currentEarringIndex));
            updateCurrentCombo();
        });

        captureBtn.addEventListener('click', async () => {
            captureBtn.classList.add('captured');
            setTimeout(() => captureBtn.classList.remove('captured'), 300);

            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = canvas.width;
            tempCanvas.height = canvas.height;
            const tempCtx = tempCanvas.getContext('2d');

            tempCtx.translate(tempCanvas.width, 0);
            tempCtx.scale(-1, 1);

            tempCtx.drawImage(video, 0, 0);
            tempCtx.drawImage(canvas, 0, 0);

            tempCtx.setTransform(1, 0, 0, 1, 0, 0);
            tempCtx.translate(tempCanvas.width, 0);
            tempCtx.scale(-1, 1);

            const dataUrl = tempCanvas.toDataURL('image/jpeg', 0.85);

            const timestamp = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
            const filename = `goldface_${timestamp}.jpg`;

            const link = document.createElement('a');
            link.download = filename;
            link.href = dataUrl;
            link.click();

            status.textContent = 'Photo downloaded!';
            status.className = 'status-bar success';
            status.style.display = 'block';
            setTimeout(() => status.style.display = 'none', 2000);
        });

        loadJewelryImages();
        initFaceMesh();
    </script>
</body>
</html>
